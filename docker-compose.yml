services:
  # ---------------------------------------------------------
  # NGINX Proxy (Main Entry Point)
  # ---------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: pupitech-nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/ssl/cloudflare/cert.pem:/etc/ssl/cloudflare/cert.pem:ro
      - /etc/ssl/cloudflare/key.pem:/etc/ssl/cloudflare/key.pem:ro
    networks:
      - pupitech-network
    depends_on:
      - snipeit
      - wordpress

  # ---------------------------------------------------------
  # Snipe-IT Service
  # ---------------------------------------------------------
  snipeit:
    image: snipe/snipe-it:latest
    container_name: snipeit
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - snipeit-data:/var/www/html/storage
    env_file: .env # Snipe-IT uses this file for its configuration
    networks:
      - pupitech-network
    depends_on:
      - snipeit-db
      - redis

  snipeit-db:
    image: mysql:8.0
    container_name: snipeit-db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - snipeit-db-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=snipeit
      - MYSQL_USER=snipeit_user
      - MYSQL_PASSWORD=${SNIPEIT_DB_PASSWORD}
    networks:
      - pupitech-network

  redis:
    image: redis:7-alpine
    container_name: snipeit-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - snipeit-redis-data:/data
    networks:
      - pupitech-network

  # ---------------------------------------------------------
  # WordPress Service
  # ---------------------------------------------------------
  wordpress:
    image: wordpress:latest
    container_name: wordpress
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - WORDPRESS_DB_HOST=wordpress-db
      - WORDPRESS_DB_USER=wordpress_user
      - WORDPRESS_DB_PASSWORD=${WP_DB_PASSWORD}
      - WORDPRESS_DB_NAME=wordpress
    volumes:
      - wordpress-data:/var/www/html
    networks:
      - pupitech-network
    depends_on:
      - wordpress-db

  wordpress-db:
    image: mariadb:10.6
    container_name: wordpress-db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=wordpress
      - MYSQL_USER=wordpress_user
      - MYSQL_PASSWORD=${WP_DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${WP_ROOT_PASSWORD}
    volumes:
      - wordpress-db-data:/var/lib/mysql
    networks:
      - pupitech-network

volumes:
  snipeit-data:
    driver: local
  snipeit-db-data:
    driver: local
  snipeit-redis-data:
    driver: local
  wordpress-data:
    driver: local
  wordpress-db-data:
    driver: local

networks:
  pupitech-network:
    driver: bridge
